<style>
  :root{
    --bg:#F2F4F8;
    --card:#FFFFFF;
    --ink:#16181D;
    --muted:#6B7280;
    --ring-a:#F58529; /* warm orange */
    --ring-b:#DD2A7B; /* magenta */
    --ring-c:#8134AF; /* violet */
    --ring-d:#515BD4; /* indigo */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 64px;
  }
  .card-col{width:100%;max-width:420px}

  /* ---- header ---- */
  .avatar-wrap{
    width:112px;height:112px;margin:0 auto 20px;
    border-radius:50%;
    padding:4px;
    background:conic-gradient(from 210deg,var(--ring-a),var(--ring-b),var(--ring-c),var(--ring-d),var(--ring-a));
    animation:ring-in .9s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes ring-in{from{transform:scale(.7) rotate(-40deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  .avatar{
    width:100%;height:100%;border-radius:50%;
    background:var(--ink);
    border:4px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif;font-weight:700;font-size:34px;color:#fff;
    letter-spacing:1px;
  }
  h1{
    font-family:'Sora',sans-serif;font-weight:700;font-size:26px;
    text-align:center;letter-spacing:-0.02em;
  }
  .tagline{
    text-align:center;color:var(--muted);font-size:15px;
    margin-top:6px;margin-bottom:32px;
  }

  /* ---- links ---- */
  .links{display:flex;flex-direction:column;gap:14px}
  .link{
    display:flex;align-items:center;gap:14px;
    background:var(--card);
    border-radius:16px;
    padding:16px 18px;
    text-decoration:none;color:var(--ink);
    font-weight:600;font-size:16px;
    box-shadow:0 1px 2px rgba(22,24,29,.06),0 4px 14px rgba(22,24,29,.05);
    border-left:5px solid var(--accent);
    transition:transform .15s ease, box-shadow .15s ease;
    animation:rise .5s ease both;
  }
  .link:nth-child(1){animation-delay:.05s}
  .link:nth-child(2){animation-delay:.12s}
  .link:nth-child(3){animation-delay:.19s}
  .link:nth-child(4){animation-delay:.26s}
  .link:nth-child(5){animation-delay:.33s}
  .link:nth-child(6){animation-delay:.40s}
  .link:nth-child(7){animation-delay:.47s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .link:hover,.link:focus-visible{
    transform:translateY(-2px);
    box-shadow:0 2px 4px rgba(22,24,29,.08),0 10px 24px rgba(22,24,29,.10);
  }
  .link:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .link svg{width:26px;height:26px;flex-shrink:0;fill:var(--accent)}
  .link .go{margin-left:auto;color:var(--muted);font-weight:400;font-size:18px}

  .fb{--accent:#1877F2}
  .ig{--accent:#DD2A7B}
  .tt{--accent:#16181D}
  .wa{--accent:#25D366}
  .em{--accent:#8134AF}
  .sc{--accent:#E8C200}
  .xx{--accent:#16181D}

  /* ---- brand logo, lower right ---- */
  .brand{
    position:fixed;
    right:16px;bottom:16px;
    z-index:10;
    display:block;
    opacity:.9;
    transition:transform .15s ease, opacity .15s ease;
    animation:rise .6s ease .55s both;
  }
  .brand img{
    width:110px;height:auto;display:block;
    filter:drop-shadow(0 2px 6px rgba(22,24,29,.18));
  }
  .brand:hover,.brand:focus-visible{opacity:1;transform:translateY(-2px)}
  .brand:focus-visible{outline:3px solid var(--ring-b);outline-offset:4px;border-radius:8px}
  @media (max-width:520px){ .brand img{width:86px} }

  footer{
    text-align:center;margin-top:36px;color:var(--muted);font-size:13px;
  }

  @media (prefers-reduced-motion: reduce){
    .avatar-wrap,.link{animation:none}
    .link{transition:none}
  }
</style>
</head>
